timeout: 3600s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

# Each step uses `entrypoint: bash` with an inline DOCKER_BUILDKIT=1 export
# so BuildKit is enabled even on fresh-cache builds. Setting it via `env:`
# was unreliable for some cold-cache runs. The Dockerfile uses
# RUN --mount=type=cache,... which requires BuildKit.

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-gateway
    entrypoint: bash
    args:
      - -c
      - |
        export DOCKER_BUILDKIT=1
        docker build --target gateway -t us-central1-docker.pkg.dev/$PROJECT_ID/kally/gateway:latest .
  - name: gcr.io/cloud-builders/docker
    id: build-runner
    entrypoint: bash
    args:
      - -c
      - |
        export DOCKER_BUILDKIT=1
        docker build --target runner -t us-central1-docker.pkg.dev/$PROJECT_ID/kally/runner:latest .
  - name: gcr.io/cloud-builders/docker
    id: build-slack
    entrypoint: bash
    args:
      - -c
      - |
        export DOCKER_BUILDKIT=1
        docker build --target slack-mcp -t us-central1-docker.pkg.dev/$PROJECT_ID/kally/slack-mcp:latest .
  - name: gcr.io/cloud-builders/docker
    id: build-vault
    entrypoint: bash
    args:
      - -c
      - |
        export DOCKER_BUILDKIT=1
        docker build --target vault -t us-central1-docker.pkg.dev/$PROJECT_ID/kally/vault:latest .
  - name: gcr.io/cloud-builders/docker
    id: build-salesforce
    entrypoint: bash
    args:
      - -c
      - |
        export DOCKER_BUILDKIT=1
        docker build --target salesforce-mcp -t us-central1-docker.pkg.dev/$PROJECT_ID/kally/salesforce-mcp:latest .
  - name: gcr.io/cloud-builders/docker
    id: build-google
    entrypoint: bash
    args:
      - -c
      - |
        export DOCKER_BUILDKIT=1
        docker build --target google-mcp -t us-central1-docker.pkg.dev/$PROJECT_ID/kally/google-mcp:latest .
  - name: gcr.io/cloud-builders/docker
    id: build-remote-cli
    entrypoint: bash
    args:
      - -c
      - |
        export DOCKER_BUILDKIT=1
        docker build --target remote-cli -t us-central1-docker.pkg.dev/$PROJECT_ID/kally/remote-cli:latest .

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/gateway:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/runner:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/slack-mcp:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/vault:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/salesforce-mcp:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/google-mcp:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/remote-cli:latest
