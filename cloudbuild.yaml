timeout: 3600s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

# Each step gets DOCKER_BUILDKIT=1 in per-step env (not options.env, which
# doesn't propagate to gcr.io/cloud-builders/docker). The Dockerfile uses
# RUN --mount=type=cache,... and per-package build stages that require BuildKit.

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-gateway
    env: ["DOCKER_BUILDKIT=1"]
    args:
      [
        "build",
        "--target",
        "gateway",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/kally/gateway:latest",
        ".",
      ]
  - name: gcr.io/cloud-builders/docker
    id: build-runner
    env: ["DOCKER_BUILDKIT=1"]
    args:
      [
        "build",
        "--target",
        "runner",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/kally/runner:latest",
        ".",
      ]
  - name: gcr.io/cloud-builders/docker
    id: build-slack
    env: ["DOCKER_BUILDKIT=1"]
    args:
      [
        "build",
        "--target",
        "slack-mcp",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/kally/slack-mcp:latest",
        ".",
      ]
  - name: gcr.io/cloud-builders/docker
    id: build-vault
    env: ["DOCKER_BUILDKIT=1"]
    args:
      [
        "build",
        "--target",
        "vault",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/kally/vault:latest",
        ".",
      ]
  - name: gcr.io/cloud-builders/docker
    id: build-salesforce
    env: ["DOCKER_BUILDKIT=1"]
    args:
      [
        "build",
        "--target",
        "salesforce-mcp",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/kally/salesforce-mcp:latest",
        ".",
      ]
  - name: gcr.io/cloud-builders/docker
    id: build-google
    env: ["DOCKER_BUILDKIT=1"]
    args:
      [
        "build",
        "--target",
        "google-mcp",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/kally/google-mcp:latest",
        ".",
      ]
  - name: gcr.io/cloud-builders/docker
    id: build-remote-cli
    env: ["DOCKER_BUILDKIT=1"]
    args:
      [
        "build",
        "--target",
        "remote-cli",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/kally/remote-cli:latest",
        ".",
      ]

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/gateway:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/runner:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/slack-mcp:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/vault:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/salesforce-mcp:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/google-mcp:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/kally/remote-cli:latest
